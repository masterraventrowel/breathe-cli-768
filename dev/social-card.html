<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breathe CLI — Social Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* deep charcoal-navy, slightly cool */
    --bg:        oklch(0.205 0.018 240);
    --bg-deep:   oklch(0.175 0.016 240);
    --line:      oklch(0.30 0.018 240);
    /* clinical teal accent */
    --accent:    oklch(0.80 0.105 192);
    --accent-dim:oklch(0.62 0.075 192);
    --ink:       oklch(0.96 0.005 240);
    --muted:     oklch(0.66 0.012 240);
    --faint:     oklch(0.50 0.012 240);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    width:100%; height:100%;
    background:#0c0f14;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  /* scale-to-fit wrapper so the fixed 1280x640 card is viewable in any pane */
  #stage{
    width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }

  .card{
    width:1280px; height:640px;
    flex:0 0 auto;
    position:relative;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', system-ui, sans-serif;
    overflow:hidden;
  }

  /* faint terminal grid texture, very subtle — keeps it technical without decoration */
  .card::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:64px 64px;
    opacity:0.14;
    pointer-events:none;
  }

  /* hairline frame marking the 40pt safe margin */
  .safe{
    position:absolute;
    left:40px; top:40px; right:40px; bottom:40px;
    display:flex; flex-direction:column;
    z-index:2;
  }

  /* ---- top: prompt line ---- */
  .prompt{
    font-family:'JetBrains Mono', monospace;
    font-size:19px;
    letter-spacing:0.02em;
    color:var(--faint);
    display:flex; align-items:center; gap:10px;
  }
  .prompt .sigil{ color:var(--accent-dim); }
  .prompt .cmd{ color:var(--muted); }
  .prompt .caret{
    display:inline-block;
    width:10px; height:20px;
    background:var(--accent);
    margin-left:2px;
    transform:translateY(2px);
  }

  /* ---- middle: title block ---- */
  .body{
    flex:1 1 auto;
    display:flex; flex-direction:column; justify-content:center;
  }

  h1{
    font-family:'JetBrains Mono', monospace;
    font-weight:800;
    font-size:118px;
    line-height:0.96;
    letter-spacing:-0.02em;
    color:var(--ink);
  }
  h1 .accent{ color:var(--accent); }

  .subtitle{
    margin-top:24px;
    font-family:'Inter', system-ui, sans-serif;
    font-weight:400;
    font-size:30px;
    letter-spacing:0.01em;
    color:var(--muted);
  }

  /* ---- breath visualisation: sine wave ---- */
  .breath{
    margin-top:40px;
    position:relative;
    width:100%;
    height:104px;
  }
  .breath svg{ display:block; width:100%; height:100%; overflow:visible; }

  .phase-row{
    margin-top:14px;
    display:flex; justify-content:space-between;
    width:100%;
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--faint);
  }
  .phase-row span.on{ color:var(--accent-dim); }

  /* ---- footer ---- */
  .footer{
    display:flex; align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size:18px;
    letter-spacing:0.02em;
    color:var(--faint);
  }
  .footer .dot{ color:var(--accent-dim); padding:0 12px; }
</style>
</head>
<body>
<div id="stage">
  <div class="card" id="card">
    <div class="safe">

      <div class="prompt">
        <span class="sigil">$</span><span class="cmd">breathe --preset calm</span><span class="caret"></span>
      </div>

      <div class="body">
        <h1>Breathe<span class="accent">-</span>CLI</h1>
        <p class="subtitle">Paced resonance breathing in the terminal</p>

        <div class="breath">
          <svg id="wave" viewBox="0 0 1200 104" preserveAspectRatio="none" aria-hidden="true"></svg>
        </div>
        <div class="phase-row">
          <span class="on">inhale</span>
          <span class="on">exhale</span>
          <span class="on">inhale</span>
          <span class="on">exhale</span>
          <span class="on">inhale</span>
        </div>
      </div>

      <div class="footer">
        <span>Single file</span><span class="dot">·</span><span>No dependencies</span><span class="dot">·</span><span>MIT license</span>
      </div>

    </div>
  </div>
</div>

<script>
  // ---- smooth sine wave representing the breath cycle ----
  (function(){
    const W = 1200, H = 104;
    const mid = H/2;
    const amp = 38;
    const cycles = 2.5;       // number of full breaths shown
    const steps = 480;
    let d = "";
    for(let i=0;i<=steps;i++){
      const x = (i/steps)*W;
      const y = mid - Math.sin((i/steps)*Math.PI*2*cycles) * amp;
      d += (i===0 ? "M" : "L") + x.toFixed(2) + " " + y.toFixed(2) + " ";
    }

    const svg = document.getElementById('wave');
    const ns = "http://www.w3.org/2000/svg";

    // baseline (resting)
    const base = document.createElementNS(ns,'line');
    base.setAttribute('x1',0); base.setAttribute('y1',mid);
    base.setAttribute('x2',W); base.setAttribute('y2',mid);
    base.setAttribute('stroke','var(--line)');
    base.setAttribute('stroke-width','1.5');
    base.setAttribute('stroke-dasharray','3 7');
    svg.appendChild(base);

    // the wave
    const path = document.createElementNS(ns,'path');
    path.setAttribute('d', d.trim());
    path.setAttribute('fill','none');
    path.setAttribute('stroke','var(--accent)');
    path.setAttribute('stroke-width','3');
    path.setAttribute('stroke-linecap','round');
    path.setAttribute('stroke-linejoin','round');
    svg.appendChild(path);

    // node markers at each crest/trough (phase turning points)
    for(let c=0;c<=cycles*2;c++){
      const x = (c/(cycles*2))*W;
      const y = mid - Math.sin(c*Math.PI) * amp; // ~mid at integers; use peaks instead
      const peakY = mid - (c%2===0 ? 0 : 0); // baseline crossings
      const dot = document.createElementNS(ns,'circle');
      dot.setAttribute('cx', x.toFixed(2));
      dot.setAttribute('cy', mid);
      dot.setAttribute('r','3.5');
      dot.setAttribute('fill','var(--bg)');
      dot.setAttribute('stroke','var(--accent-dim)');
      dot.setAttribute('stroke-width','2');
      svg.appendChild(dot);
    }
  })();

  // ---- scale the fixed card to fit the viewport (view only; export uses true px) ----
  function fit(){
    const card = document.getElementById('card');
    const sx = window.innerWidth / 1280;
    const sy = window.innerHeight / 640;
    const s = Math.min(sx, sy, 1);
    card.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  fit();
</script>
</body>
</html>
